<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dale's Portfolio</title>
    <style>
        /* Existing styles */
        body.intro-active .preloader { display: flex; }
        /* Adding preloader styles */
        .preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .morph-text {
            /* Add your existing or new styles here */
            animation: morph 3s ease forwards;
        }
        @keyframes morph {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body class="intro-active">
    <div class="preloader">
        <h1 class="morph-text">Welcome to My Portfolio</h1>
    </div>
    <!-- Existing content before this point remains unchanged -->
    <script>
        window.onload = function() {
            document.querySelector('.preloader').style.display = 'none';
            document.body.classList.add('intro-complete');
        };
    </script>
    <!-- Rest of the existing body content -->

</body>
</html>
