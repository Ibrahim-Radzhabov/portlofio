<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Portfolio</title>
    <!-- Include your existing styles and scripts here -->
    <link rel="stylesheet" href="styles.css">
    <script src="scripts.js" defer></script>
    <style>
        /* Cinematic Gooey Preloader */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .gooey {
            width: 50px;
            height: 50px;
            background: #3498db;
            border-radius: 50%;
            animation: gooey 1.5s infinite;
        }
        @keyframes gooey {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.5);
            }
        }
    </style>
</head>
<body>
    <div id="preloader">
        <div class="gooey"></div>
    </div>

    <main>
        <!-- Your existing portfolio content goes here -->
    </main>

    <script>
        window.onload = function() {
            const preloader = document.getElementById('preloader');
            preloader.style.display = 'none';
        };
    </script>
</body>
</html>
