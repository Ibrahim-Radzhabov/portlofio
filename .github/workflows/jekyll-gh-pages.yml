# Production whitelist deploy to GitHub Pages (no Jekyll)
name: Deploy static site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Prepare static artifact
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site

          cp index.html _site/
          cp 404.html _site/
          cp robots.txt _site/
          cp sitemap.xml _site/
          cp llms.txt _site/
          cp CNAME _site/
          cp .nojekyll _site/

          cp favicon.svg _site/
          cp favicon.ico _site/
          cp favicon-16.png _site/
          cp favicon-32.png _site/
          cp favicon-48.png _site/
          cp favicon-180.png _site/
          cp apple-touch-icon.png _site/
          cp og-image.png _site/

          cp -R assets _site/
          cp -R cases _site/
          cp -R services _site/
          cp -R niches _site/
          cp -R cities _site/
          cp -R blog _site/
          cp -R tools _site/
          cp -R legal _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
